<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MVMS | THE ELITE EAGLE PORTAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --red: #cc0000; --dark: #050505; }
        body { background: var(--dark); color: #fff; font-family: 'Segoe UI', sans-serif; }
        .trivia-btn { width: 100%; padding: 15px; margin: 10px 0; background: #111; border: 1px solid #333; border-radius: 10px; color: white;}
        .trivia-btn:hover { background: var(--red); }
    </style>
</head>
<body>

<div id="trivia-tab">
    <h2>TRIVIA CHALLENGE</h2>

    <div id="quiz-container">
        <p id="q-text"></p>
        <div id="q-options"></div>

        <div id="result-container">
            <h3>Your Result:</h3>
            <p id="score-text">Take the quiz to see your results!</p>
        </div>
    </div>
</div>

<script>
// ✅ TRIVIA DATA
const triviaData = [
    { q: "Mascot of MVMS?", a: ["Hawk", "Eagle", "Falcon"], c: 1 },
    { q: "Principal?", a: ["Dr. Snell", "Mr. Pierce", "Mrs. Knerr"], c: 0 },
    { q: "Yearbook School Code?", a: ["137269m", "123456", "999999"], c: 0 },
    { q: "2026 Spring Musical?", a: ["Mary Poppins Jr", "Frozen", "Annie"], c: 0 }
];

let currentQ = 0;
let score = 0;

// ✅ LOAD QUESTION
function startTrivia() {
    if (currentQ >= triviaData.length) {
        showScore();
        return;
    }

    const q = triviaData[currentQ];
    document.getElementById("q-text").innerText = q.q;

    const optionsDiv = document.getElementById("q-options");
    optionsDiv.innerHTML = "";

    q.a.forEach((answer, index) => {
        const btn = document.createElement("button");
        btn.innerText = answer;
        btn.className = "trivia-btn";

        btn.onclick = () => {
            if (index === q.c) {
                score++;
            }

            currentQ++;
            startTrivia();
        };

        optionsDiv.appendChild(btn);
    });
}

// ✅ SHOW FINAL SCORE
function showScore() {
    document.getElementById("q-text").innerText = "Quiz Complete!";
    document.getElementById("q-options").innerHTML = "";

    document.getElementById("score-text").innerText =
        "You scored " + score + " out of " + triviaData.length + "!";
}

// start quiz
startTrivia();
</script>

</body>
</html>
